# Development environment configuration
# Extends base.yaml with development-specific overrides

# Application
app:
  debug: true

# Logging
logging:
  level: "DEBUG"

# CORS (development - permissive)
cors:
  allow_origins:
    - "*"

# Processing
processing:
  max_iterations: 5
  processing_timeout_seconds: 600
  max_concurrent_jobs: 2
