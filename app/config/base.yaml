# Base configuration - common settings for all environments
# This file contains default values that can be overridden by environment-specific configs

# Application
app:
  name: "Visual Recommendations Agentic Workflow"
  version: "0.1.0"
  debug: false

# API
api:
  v1_prefix: "/api/v1"

# Storage
storage:
  upload_dir: "data/input"
  output_dir: "data/output"

# Processing
processing:
  max_file_size_mb: 10
  allowed_file_types:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".webp"
  max_iterations: 3
  processing_timeout_seconds: 300

# Logging
logging:
  level: "INFO"

# CORS
cors:
  allow_credentials: true
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Content-Type
    - Authorization
