# Base configuration - common settings for all environments
# This file contains default values that can be overridden by environment-specific configs

# Application
app:
  name: "Visual Recommendations Agentic Workflow"
  version: "0.1.0"
  debug: false

# API
api:
  v1_prefix: "/api/v1"

# Storage
storage:
  upload_dir: "data/upload"
  output_dir: "data/output"

# Database
database:
  path: "data/jobs.db"

# Processing
processing:
  max_file_size_mb: 10
  allowed_file_types:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".webp"
  max_iterations: 3
  processing_timeout_seconds: 900
  max_concurrent_jobs: 1

# Logging
logging:
  level: "INFO"

# LLM Configuration
# Available providers: openai_compatible
# To enable LLM, set enabled: true and provide an api_key in environment (see .env.example)
llm:
  enabled: false
  provider: "openai_compatible"  # Options: openai_compatible
  base_url: "http://localhost:7878/v1"
  model_name: "Qwen3.5-27B-Q4_K_M"
  temperature: 0.7

# CORS
cors:
  allow_credentials: true
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Content-Type
    - Authorization

# Prompts
prompts:
  deep_agent_system: "app/agents/prompts/deep_agent_system_prompt.md"
  deep_agent_user_message: "app/agents/prompts/deep_agent_user_message.jinja2"

# Evaluation Configuration
evaluation:
  enabled: false
  provider: "openai_compatible"  # Options: openai_compatible
  base_url: "http://localhost:7878/v1"
  model_name: "Qwen3.5-27B-Q4_K_M"
  temperature: 0.7

subagents:
  planner:
    description: >
      Analyzes visual recommendations and decomposes them into actionable
      sub-tasks. Selects appropriate tools and parameters for image editing.
    model: ""
    system_prompt: |
      You are a Planner Agent for image editing workflows.
      
      ## Your Responsibilities
      1. Analyze the visual recommendation
      2. Cross-reference with brand guidelines
      3. Decompose into atomic editing operations
      4. Select appropriate tools and parameters
      
      ## Output Format
      Return a structured plan with:
      - Task decomposition
      - Tool selection rationale
      - Parameter recommendations
      - Priority ordering

      **DO NOT WRITE YOUR RESPONSE IN JSON FORMAT**
    tools: []

  editor:
    description: >
      ALWAYS use this first to edit images based on visual recommendations.
    model: ""
    system_prompt: |
      You are an expert image editing assistant specialized in applying visual recommendations to images. ALWAYS use an image editing model to achieve this.

      ## Workflow

      1. Craft a prompt for the `execute_edit` toolt based on the user's input
      2. Edit the image using the `execute_edit` tool

      Always respect brand guidelines when processing recommendations.
      
      ## Tools
      - execute_edit(prompt, image_path, priority)

      **DO NOT WRITE YOUR RESPONSE IN JSON FORMAT**
    tools:
      - execute_edit

  critic:
    description: >
      Evaluates generated variants against recommendations and brand guidelines. Provides scoring and feedback for refinement.
    model: ""
    system_prompt: |
      You are a Critic Agent for image editing workflows.
      
      ## Your Responsibilities
      1. Evaluate variant against original recommendation
      2. Check brand guideline compliance
      3. Provide numerical score (0.0 - 1.0)
      4. Give actionable feedback for improvement
      5. Update memory by using the `update_memory` tool
      
      ## Scoring Criteria
      - Recommendation adherence: 50%
      - Brand compliance: 30%
      - Visual quality: 20%
      
      ## Tools
      - evaluate_variant(variant_path, recommendation, brand_guidelines)
      - update_memory(variant_path, score, feedback)

      **DO NOT WRITE YOUR RESPONSE IN JSON FORMAT**
    tools:
      - evaluate_variant
      - update_memory

  refiner:
    description: >
      Analyzes critic feedback and suggests prompt/parameter adjustments. Generates refined plans for retry attempts.
    model: ""
    system_prompt: |
      You are a Refiner Agent for image editing workflows.
      
      ## Your Responsibilities
      1. Get the history of image edits by using the `get_memory` tool
      2. Analyze critic feedback
      3. Identify root causes of low scores
      4. Adjust prompts for better recommendation adherence
      5. Modify parameters for improved quality
      
      ## Workflow
      1. FIRST: Call get_memory() to retrieve complete job history
      2. Analyze edit_history to understand what has been tried
      3. Review evaluation scores and feedback
      4. Propose refined approach based on patterns identified
      
      ## Tools
      - get_memory() - Retrieves complete job memory

      **DO NOT WRITE YOUR RESPONSE IN JSON FORMAT**
    tools:
      - get_memory

# Image Editing Configuration
# Available strategies: klein, gemini, mock
# - klein: Local FLUX.2-klein model (requires GPU)
# - gemini: Google Gemini API (requires API key)
# - mock: Returns random images from output folder (for testing)
image_editing:
  enabled: true
  strategy: "gemini"  # Options: klein, gemini, mock
  model_path: "gemini-3.1-flash-image-preview"  # For klein: model path (e.g. black-forest-labs/FLUX.2-klein-4B), For gemini: model name (e.g., gemini-3.1-flash-image-preview)
  device: "auto"  # Options: auto, cuda, cpu (only for klein strategy)
  enable_cpu_offload: true  # Only for klein strategy
  dtype: "bfloat16"  # Options: bfloat16, float16, float32 (only for klein strategy)
