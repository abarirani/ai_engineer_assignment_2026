# Base configuration - common settings for all environments
# This file contains default values that can be overridden by environment-specific configs

# Application
app:
  name: "Visual Recommendations Agentic Workflow"
  version: "0.1.0"
  debug: false

# API
api:
  v1_prefix: "/api/v1"

# Storage
storage:
  upload_dir: "data/input"
  output_dir: "data/output"

# Processing
processing:
  max_file_size_mb: 10
  allowed_file_types:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".webp"
  max_iterations: 3
  processing_timeout_seconds: 300

# Logging
logging:
  level: "INFO"

# LLM Configuration
# Available providers: openai_compatible
# To enable LLM, set enabled: true and provide an api_key
llm:
  enabled: false
  provider: "openai_compatible"  # Options: openai_compatible
  base_url: "http://localhost:7777/v1"
  model_name: "Qwen3.5-35B-A3B-UD-Q4_K_M (CPU)"
  temperature: 0.7

# CORS
cors:
  allow_credentials: true
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Content-Type
    - Authorization

# Prompts
prompts:
  deep_agent_system: "app/agents/prompts/deep_agent_system_prompt.md"
  deep_agent_user_message: "app/agents/prompts/deep_agent_user_message.jinja2"

# Image Editing Configuration
image_editing:
  enabled: true
  strategy: "klein"
  model_path: "black-forest-labs/FLUX.2-klein-4B"
  device: "auto"
  enable_cpu_offload: true
  dtype: "bfloat16"
