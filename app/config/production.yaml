# Production environment configuration
# Extends base.yaml with production-specific overrides

# Application
app:
  debug: false

# Logging
logging:
  level: "WARNING"

# CORS (production - restrictive)
cors:
  allow_origins:
    - "https://api.neuronsinc.com"

# Processing
processing:
  max_iterations: 3
  processing_timeout_seconds: 900
  max_concurrent_jobs: 20

llm:
  enabled: true
  provider: "openai_compatible"
  base_url: "https://api.openai.com/v1"
  model_name: "gpt-4o"  # or gpt-4-turbo, gpt-3.5-turbo, etc.
  temperature: 0.7

evaluation:
  enabled: true
  provider: "openai_compatible"
  base_url: "https://api.openai.com/v1"
  model_name: "gpt-4o"
  temperature: 0.7
