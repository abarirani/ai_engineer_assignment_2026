# Production environment configuration
# Extends base.yaml with production-specific overrides

# Application
app:
  debug: false

# Logging
logging:
  level: "WARNING"

# CORS (production - restrictive)
cors:
  allow_origins:
    - "https://api.neuronsinc.com"

# Processing
processing:
  max_iterations: 3
  processing_timeout_seconds: 300
  max_concurrent_jobs: 20
