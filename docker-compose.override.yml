# Visual Recommendations Agentic Workflow - Docker Compose Override
# Development environment overrides

version: '3.8'

services:
  # Backend API Service - Development overrides
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - APP_ENV=development
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5050
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./app:/app/app
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5050/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Streamlit Service - Development overrides
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - API_BASE_URL=http://backend:5050/api/v1
    volumes:
      - ./frontend:/app/frontend
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8501:8501"
    depends_on:
      - backend
